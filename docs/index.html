<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 World Cup - Knockout Predictor</title>
    
    <!-- Pinned Tailwind CSS CDN & Config -->
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'cup-bg': '#060913',
                        'cup-panel': '#111827',
                        'cup-accent': '#00F0FF',
                        'cup-pink': '#FF0055',
                        'cup-win': '#00FF66',
                        'cup-line': '#2A3655',
                        'cup-text': '#8A99B5'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Teko', 'sans-serif']
                    },
                    backgroundImage: {
                        'glow-gradient': 'radial-gradient(circle at top right, rgba(0, 240, 255, 0.1), transparent 50%), radial-gradient(circle at bottom left, rgba(255, 0, 85, 0.1), transparent 50%)',
                        'grid-pattern': 'linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px)'
                    }
                }
            }
        }
    </script>
    
    <!-- Pinned External UI Libraries CDNs -->
    <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- Google Fonts Links and Custom Extracted Stylesheet -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Teko:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-[100dvh] flex flex-col">
    <div id="root" class="h-full"></div>

    <!-- Application JavaScript Source Files (Dependency order respected) -->
    <script src="constants.js"></script>
    <script type="text/babel" src="app.js"></script>
</body>
</html>
